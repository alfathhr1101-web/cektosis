<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>TO CHECK</title>

    <!-- favicon -->

    <link
        rel="icon"
        type="image/png"
        sizes="64x64"
        href="assets/logo.png"
    >

    <link
        rel="apple-touch-icon"
        href="assets/logo.png"
    >

    <!-- css -->

   <link rel="stylesheet" href="css/style.min.css">

</head>

<body>

    <!-- intro loading -->

<div class="intro-loading" id="introLoading">

    <div class="intro-box">

        <img
            src="assets/logo.png"
            class="intro-logo"
        >


    </div>

</div>

    <!-- container -->

    <div class="container">

        <!-- topbar -->

        <div class="topbar">

            <div class="logo-area">

                <img
                    src="assets/logo.png"
                    class="header-logo"
                >

                 <h1>Turn Over Check</h1>

    <div class="right-menu">

        <button id="themeToggle" class="theme-btn">
            🌙
        </button>

        <div class="contact">

            <div>Jika Ada Kendala</div>

            <a href="https://wa.me/855765772633" target="_blank">
                Klik WhatsApp
            </a>

            </div>

        </div>

        <!-- info -->

        <div class="info">

            Paste full history transaksi lalu klik Hitung TO

        </div>

        <!-- textarea -->

        <textarea
            id="inputData"
            placeholder="Paste history transaksi disini..."
        ></textarea>

        <!-- button -->

        <button onclick="hitungTO()">

            Hitung TO

        </button>

        <!-- summary -->

        <div class="summary">

            <div class="card">

                <h3>Jenis TO</h3>

                <p id="bonusType">-</p>

            </div>

            <div class="card">

                <h3>Saldo Dasar</h3>

                <p id="bonusSaldo">0</p>

            </div>

            <div class="card">

                <h3>Target TO</h3>

                <p id="targetTO">0</p>

            </div>

            <div class="card">

                <h3>TO Dimainkan</h3>

                <p id="playedTO">0</p>

            </div>

            <div class="card">

                <h3>Sisa TO</h3>

                <p id="sisaTO">0</p>

            </div>

        </div>

        <!-- table -->

        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>

                        <th>Tanggal</th>

                        <th>Game</th>

                        <th>ID Transaksi</th>

                        <th>Deskripsi</th>

                        <th>Debit</th>

                    </tr>

                </thead>

                <tbody id="resultBody">

                </tbody>

            </table>

        </div>

    </div>

    <!-- footer -->

    <div class="footer">

        BY SIS4D

    </div>

    <!-- js -->

    <script src="js/app.min.js"></script>

</body>

</html>
